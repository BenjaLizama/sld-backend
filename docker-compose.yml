services:
  redis:
    image: redis:7-alpine
    container_name: sld-redis
    networks:
      - sld-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: sld-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - sld-network

  autenticacion-seguridad:
    build:
      context: ./autenticacion-seguridad
    container_name: sld-auth
    depends_on:
      - redis
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DEV_PORT: 8081
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RSA_PRIVATE: ""
      RSA_PUBLIC: ""
    networks:
      - sld-network

  usuarios-perfiles:
    build:
      context: ./usuarios-perfiles
    container_name: sld-users
    depends_on:
      - rabbitmq
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8083
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
    networks:
      - sld-network

  backend-for-frontend:
    build:
      context: ./backend-for-frontend
    container_name: sld-bff
    depends_on:
      - autenticacion-seguridad
      - usuarios-perfiles
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8082
      SERVICES_AUTH_SERVICE_URL: http://autenticacion-seguridad:8081
      SERVICES_USER_SERVICE_URL: http://usuarios-perfiles:8083
    networks:
      - sld-network

networks:
  sld-network:
    driver: bridge
