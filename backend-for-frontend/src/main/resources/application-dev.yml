server:
  port: 8082

services:
  auth-service:
    url: http://autenticacion-seguridad:8081  # El nombre que pusiste en el compose

  user-service:
    url: http://usuarios-perfiles:8083        # El nombre que pusiste en el compose

logging:
  level:
    org.springframework.web: DEBUG
resilience4j:
  circuitbreaker:
    instances:
      user-service:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
      aurh-service:
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        sliding-window-size: 10
        wait-duration-in-open-state: 30s